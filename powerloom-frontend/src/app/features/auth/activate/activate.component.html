<div class="min-h-screen flex items-center justify-center p-8 bg-gray-50">
  <div class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100 p-8 text-center animate-fade-in relative z-10">
    
    <!-- Loading State -->
    <div *ngIf="status === 'LOADING'" class="flex flex-col items-center">
      <svg class="animate-spin h-12 w-12 text-indigo-600 mb-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      <h2 class="text-2xl font-bold text-gray-900 mb-2">Activating Account</h2>
      <p class="text-gray-500">{{ message }}</p>
    </div>

    <!-- Success State -->
    <div *ngIf="status === 'SUCCESS'" class="flex flex-col items-center animate-slide-up">
      <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-6 shadow-inner border border-green-200">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
      </div>
      <h2 class="text-2xl font-extrabold text-gray-900 mb-2">Success!</h2>
      <p class="text-gray-500 mb-8">{{ message }}</p>
      <a routerLink="/login" class="w-full py-3 px-4 flex justify-center text-white bg-indigo-600 rounded-xl hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 font-bold shadow-md transition-all hover:shadow-lg hover:-translate-y-0.5">
        Proceed to Login
      </a>
    </div>

    <!-- Error State -->
    <div *ngIf="status === 'ERROR'" class="flex flex-col items-center animate-slide-up">
      <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mb-6 shadow-inner border border-red-200">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>
      </div>
      <h2 class="text-2xl font-extrabold text-gray-900 mb-2">Activation Failed</h2>
      <p class="text-gray-500 mb-8">{{ message }}</p>
      <a routerLink="/register" class="w-full py-3 px-4 flex justify-center text-white bg-indigo-600 rounded-xl hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 font-bold shadow-md transition-all hover:shadow-lg hover:-translate-y-0.5">
        Back to Registration
      </a>
    </div>

  </div>

  <!-- Background decorative -->
  <div class="fixed inset-0 z-0 bg-gray-50 flex justify-center overflow-hidden pointer-events-none">
    <div class="absolute -top-[30%] -right-[10%] w-[50rem] h-[50rem] rounded-full bg-indigo-50 border border-indigo-100 opacity-60 filter blur-3xl"></div>
    <div class="absolute -bottom-[20%] -left-[10%] w-[40rem] h-[40rem] rounded-full bg-blue-50 border border-blue-100 opacity-50 filter blur-3xl"></div>
  </div>
</div>
