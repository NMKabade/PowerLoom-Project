<div class="min-h-screen flex text-gray-900 bg-gray-50">
  <!-- Left Side Form -->
  <div class="w-full lg:w-1/2 flex items-center justify-center p-8 sm:p-12 overflow-y-auto">
    <div class="max-w-md w-full animate-fade-in relative z-10">
      
      <div class="mb-12 text-center lg:text-left">
        <h2 class="text-4xl font-black mb-3 text-gray-900 tracking-tight">Create Account</h2>
        <p class="text-sm text-gray-400 font-bold uppercase tracking-widest">Join PowerLoom as a Jober</p>
      </div>

      <form class="space-y-6" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        
        <div *ngIf="errorMsg" class="p-4 bg-red-50 border border-red-100 text-red-600 rounded-2xl text-sm font-bold animate-shake">
          {{ errorMsg }}
        </div>

        <div class="space-y-2">
          <label class="block text-sm font-bold text-gray-600 ml-1">Username</label>
          <input formControlName="username" type="text"
            class="w-full px-5 py-3.5 rounded-2xl border border-gray-100 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all bg-gray-50 outline-none text-gray-800 font-medium placeholder:text-gray-300" placeholder="e.g. johndoe123">
        </div>

        <div class="space-y-2">
          <label class="block text-sm font-bold text-gray-600 ml-1">Password</label>
          <input formControlName="password" type="password"
            class="w-full px-5 py-3.5 rounded-2xl border border-gray-100 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all bg-gray-50 outline-none text-gray-800 font-medium placeholder:text-gray-300" placeholder="••••••••">
        </div>

        <div class="grid grid-cols-2 gap-6">
          <div class="space-y-2">
            <label class="block text-sm font-bold text-gray-600 ml-1">First Name</label>
            <input formControlName="first_name" type="text"
              class="w-full px-5 py-3.5 rounded-2xl border border-gray-100 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all bg-gray-50 outline-none text-gray-800 font-medium placeholder:text-gray-300" placeholder="John">
          </div>
          <div class="space-y-2">
            <label class="block text-sm font-bold text-gray-600 ml-1">Last Name</label>
            <input formControlName="last_name" type="text"
              class="w-full px-5 py-3.5 rounded-2xl border border-gray-100 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all bg-gray-50 outline-none text-gray-800 font-medium placeholder:text-gray-300" placeholder="Doe">
          </div>
        </div>

        <div formGroupName="profile" class="space-y-6">
          <div class="space-y-2">
            <label class="block text-sm font-bold text-gray-600 ml-1">Phone</label>
            <input formControlName="phone" type="text"
              class="w-full px-5 py-3.5 rounded-2xl border border-gray-100 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all bg-gray-50 outline-none text-gray-800 font-medium placeholder:text-gray-300" placeholder="+91 XXXXX XXXXX">
          </div>
          
          <div class="space-y-2">
            <label class="block text-sm font-bold text-gray-600 ml-1">Address</label>
            <textarea formControlName="address" rows="2"
              class="w-full px-5 py-3.5 rounded-2xl border border-gray-100 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all bg-gray-50 outline-none text-gray-800 font-medium placeholder:text-gray-300 resize-none"></textarea>
          </div>
        </div>

        <div class="pt-4">
          <button type="submit" [disabled]="registerForm.invalid || isLoading"
            class="w-full py-4.5 px-6 flex justify-center items-center text-white bg-[#A5A6F6] rounded-[1.25rem] shadow-xl shadow-indigo-100 hover:shadow-indigo-200 hover:-translate-y-1 active:scale-95 transition-all font-black text-lg uppercase tracking-widest disabled:opacity-50 disabled:translate-y-0 disabled:shadow-none">
            <span *ngIf="!isLoading">Register Account</span>
            <span *ngIf="isLoading" class="flex items-center">
              <svg class="animate-spin -ml-1 mr-3 h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Creating Account...
            </span>
          </button>
        </div>
      </form>

      <div class="mt-10 pt-10 border-t border-gray-100 flex flex-col items-center">
        <p class="text-sm text-gray-400 font-bold uppercase tracking-widest mb-5">Already have an account?</p>
        <a routerLink="/login" class="w-full py-4 px-6 flex justify-center text-gray-600 border-2 border-gray-100 rounded-xl hover:bg-gray-50 transition-all font-black text-sm uppercase tracking-widest">
          Sign In Instead
        </a>
      </div>
    </div>
  </div>


  <!-- Right Side Visuals -->
  <div class="hidden lg:flex w-1/2 bg-indigo-50 flex-col justify-center relative overflow-hidden">
    <div class="absolute inset-0 bg-cover bg-center opacity-60 mix-blend-multiply filter blur-[2px]" style="background-image: url('https://images.unsplash.com/photo-1605810230434-7631ac76ec81?ixlib=rb-4.0.3&auto=format&fit=crop&w=1740&q=80');"></div>
    <div class="absolute inset-0 bg-gradient-to-t from-indigo-900/90 to-transparent"></div>
    <div class="z-10 p-12 text-white mt-auto animate-slide-up">
      <h3 class="text-4xl font-bold mb-4 drop-shadow-md">Join the Future of Textiles</h3>
      <p class="text-lg text-indigo-100 max-w-lg leading-relaxed drop-shadow">
        Empowering jobers with transparent production logs, real-time approvals, and instant digital tracking of earnings and activity.
      </p>
    </div>
  </div>
</div>
