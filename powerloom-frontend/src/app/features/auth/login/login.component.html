<div class="min-h-screen relative flex items-center justify-center overflow-hidden bg-gray-50">
  <!-- Animated Background Elements -->
  <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
    <div
      class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-indigo-400 opacity-20 filter blur-[100px] animate-blob mix-blend-multiply">
    </div>
    <div
      class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-emerald-400 opacity-20 filter blur-[120px] animate-blob mix-blend-multiply"
      style="animation-delay: 2s;"></div>
    <div
      class="absolute top-[20%] right-[20%] w-[40vw] h-[40vw] rounded-full bg-purple-400 opacity-20 filter blur-[90px] animate-blob mix-blend-multiply"
      style="animation-delay: 4s;"></div>
  </div>

  <!-- Glassmorphic Card -->
  <div
    class="relative z-10 w-full max-w-md p-10 sm:p-12 mx-4 bg-white shadow-[0_20px_60px_-15px_rgba(0,0,0,0.1)] rounded-[2.5rem] border border-white animate-scale-up">

    <div class="text-center mb-10">
      <div
        class="inline-flex items-center justify-center w-20 h-20 rounded-[1.5rem] bg-indigo-600 text-white shadow-xl shadow-indigo-200 mb-6 group transition-all duration-500 hover:rotate-6">
        <span class="text-4xl font-black tracking-tighter">P</span>
      </div>
      <h2 class="text-4xl font-black text-gray-900 tracking-tight">PowerLoom</h2>
      <p class="text-sm text-gray-400 mt-3 font-bold uppercase tracking-widest">Sign in to continue</p>
    </div>

    <form class="space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div *ngIf="errorMsg"
        class="p-4 bg-red-50 border border-red-100 text-red-600 rounded-2xl text-sm animate-shake shadow-sm flex items-center gap-2 font-bold">
        <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        {{ errorMsg }}
      </div>

      <div class="space-y-2">
        <label for="username" class="block text-sm font-bold text-gray-600 ml-1">Email or Username</label>
        <input id="username" formControlName="username" type="text" autocomplete="username"
          class="w-full px-5 py-4 rounded-2xl border border-gray-100 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all bg-gray-50 outline-none text-gray-800 font-medium placeholder:text-gray-300"
          placeholder="e.g. john_doe">
      </div>

      <div class="space-y-2">
        <div class="flex justify-between items-center ml-1">
          <label for="password" class="text-sm font-bold text-gray-600">Password</label>
        </div>
        <div class="relative">
          <input id="password" formControlName="password" [type]="showPassword ? 'text' : 'password'"
            autocomplete="current-password"
            class="w-full px-5 py-4 rounded-2xl border border-gray-100 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all bg-gray-50 outline-none text-gray-800 font-medium pr-12 placeholder:text-gray-300"
            placeholder="••••••••">
          <button type="button" (click)="togglePasswordVisibility()"
            class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-300 hover:text-indigo-600 transition-colors">
            <svg *ngIf="!showPassword" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
            <svg *ngIf="showPassword" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
            </svg>
          </button>
        </div>
        <div class="flex justify-end">
          <a routerLink="/forgot-password"
            class="text-xs font-black text-indigo-600 hover:text-indigo-800 transition-colors tracking-widest">Forgot
            password?</a>
        </div>

      </div>

      <div class="pt-4">
        <button type="submit" [disabled]="loginForm.invalid || isLoading"
          class="w-full py-4.5 px-6 flex justify-center items-center text-white bg-indigo-600 rounded-[1.25rem] shadow-xl shadow-indigo-200 hover:bg-indigo-700 hover:shadow-indigo-300 hover:-translate-y-1 active:scale-95 transition-all font-black text-lg uppercase tracking-widest disabled:opacity-50 disabled:translate-y-0 disabled:shadow-none disabled:hover:bg-indigo-600">
          <span *ngIf="!isLoading">Sign In</span>
          <span *ngIf="isLoading" class="flex items-center">
            <svg class="animate-spin -ml-1 mr-3 h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
              viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
              </path>
            </svg>
            Signing In...
          </span>
        </button>
      </div>
    </form>
  </div>
</div>
