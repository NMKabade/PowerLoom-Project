<div class="min-h-screen flex">
  <!-- Left Side (Image/Branding) -->
  <div
    class="hidden lg:flex w-1/2 bg-gradient-to-br from-indigo-900 via-indigo-700 to-indigo-500 text-white flex-col justify-center items-center relative overflow-hidden">
    <!-- Abstract shape -->
    <div class="absolute -top-32 -left-32 w-96 h-96 rounded-full bg-white opacity-10 filter blur-3xl"></div>
    <div
      class="absolute -bottom-32 -right-32 w-[30rem] h-[30rem] rounded-full bg-indigo-400 opacity-20 filter blur-3xl">
    </div>

    <div class="z-10 text-center px-12 animate-fade-in">
      <h1 class="text-5xl font-extrabold tracking-tight mb-4 drop-shadow-lg">PowerLoom</h1>
      <p class="text-lg text-indigo-100 font-light max-w-md mx-auto">
        Streamline your textile production, manage jobers seamlessly, and scale your business effortlessly.
      </p>
    </div>
  </div>

  <!-- Right Side (Form) -->
  <div class="w-full lg:w-1/2 flex items-center justify-center p-8 bg-gray-50">
    <div class="max-w-md w-full animate-slide-up">
      <div class="mb-10 text-center lg:text-left">
        <h2 class="text-3xl font-bold text-gray-900 mb-2">Welcome</h2>
      </div>

      <form class="space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div *ngIf="errorMsg"
          class="p-4 bg-red-50/80 backdrop-blur-sm border border-red-200 text-red-600 rounded-xl text-sm animate-fade-in shadow-sm">
          {{ errorMsg }}
        </div>

        <div>
          <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Email or Username</label>
          <input id="username" formControlName="username" type="text" autocomplete="username"
            [class]="'w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all shadow-sm bg-white ' +
              (loginForm.get('username')?.invalid && loginForm.get('username')?.touched ? 'border-red-400' : 'border-gray-200')"
            placeholder="Enter your email or username">
          <div *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched" class="mt-1 text-xs text-red-500">
            <span *ngIf="loginForm.get('username')?.errors?.['required']">Username or email is required.</span>
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <div class="relative">
            <input id="password" formControlName="password" [type]="showPassword ? 'text' : 'password'"
              autocomplete="current-password"
              [class]="'w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all shadow-sm bg-white pr-12 ' +
                (loginForm.get('password')?.invalid && loginForm.get('password')?.touched ? 'border-red-400' : 'border-gray-200')"
              placeholder="Enter your password">
            <button type="button" (click)="togglePasswordVisibility()"
              class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-indigo-600 focus:outline-none transition-colors">
              <svg *ngIf="!showPassword" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
              <svg *ngIf="showPassword" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
              </svg>
            </button>
          </div>
          <div class="flex justify-between items-start mt-1">
            <div class="text-xs text-red-500">
              <span *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                <span *ngIf="loginForm.get('password')?.errors?.['required']">Password is required.</span>
                <span *ngIf="loginForm.get('password')?.errors?.['minlength']">Minimum 6 characters required.</span>
              </span>
            </div>
            <a routerLink="/forgot-password"
              class="text-xs font-semibold text-indigo-600 hover:text-indigo-500 transition-colors whitespace-nowrap ml-2">Forgot password?</a>
          </div>
        </div>

        <div>
          <button type="submit" [disabled]="loginForm.invalid || isLoading"
            class="w-full py-3 px-4 flex justify-center text-white bg-indigo-600 rounded-xl hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 font-semibold shadow-md transition-all hover:-translate-y-0.5 disabled:opacity-50 disabled:hover:translate-y-0">
            <span *ngIf="!isLoading">Sign in</span>
            <span *ngIf="isLoading" class="flex items-center">
              <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
                viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                </path>
              </svg>
              Signing in...
            </span>
          </button>
        </div>
      </form>


    </div>
  </div>
</div>
