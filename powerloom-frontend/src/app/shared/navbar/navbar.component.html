<nav class="bg-indigo-600 shadow-xl relative z-50">

    <div class="flex items-center justify-between h-16">
      <div class="flex items-center">
        <div class="flex-shrink-0 flex items-center gap-2 cursor-pointer transition-transform hover:scale-105">
          <div class="w-8 h-8 bg-white rounded-lg flex items-center justify-center text-indigo-600 font-black text-xl shadow-inner">
            P
          </div>
          <span class="text-white font-extrabold text-xl tracking-wide hidden sm:block">PowerLoom</span>
        </div>
        <div class="hidden md:block" *ngIf="authService.currentUser() as user">
          <div class="ml-10 flex items-baseline space-x-2">

            <ng-container *ngIf="user.role === 'ADMIN'">
              <a routerLink="/owner/dashboard" routerLinkActive="bg-indigo-700 shadow-inner" class="text-white hover:bg-indigo-500 px-4 py-2 rounded-xl text-sm font-semibold transition-colors duration-200">Dashboard</a>
              <a routerLink="/owner/approvals" routerLinkActive="bg-indigo-700 shadow-inner" class="text-indigo-50 hover:bg-indigo-500 px-4 py-2 rounded-xl text-sm font-semibold transition-colors duration-200 flex items-center gap-2">
                Approvals
                <span class="bg-indigo-400 text-white text-xs px-2 py-0.5 rounded-full">New</span>
              </a>
              <a routerLink="/owner/manage-jobers" routerLinkActive="bg-indigo-700 shadow-inner" class="text-indigo-50 hover:bg-indigo-500 px-4 py-2 rounded-xl text-sm font-semibold transition-colors duration-200">Manage Jobers</a>
              <a routerLink="/owner/manage-machines" routerLinkActive="bg-indigo-700 shadow-inner" class="text-indigo-50 hover:bg-indigo-500 px-4 py-2 rounded-xl text-sm font-semibold transition-colors duration-200 flex items-center gap-2">

              </a>
            </ng-container>

            <!-- Jober Links -->
            <ng-container *ngIf="user.role === 'JOBER'">
              <a routerLink="/jober/dashboard" routerLinkActive="bg-indigo-700 shadow-inner" class="text-white hover:bg-indigo-500 px-4 py-2 rounded-xl text-sm font-semibold transition-colors duration-200">Dashboard</a>
              <a routerLink="/jober/submit" routerLinkActive="bg-indigo-700 shadow-inner" class="text-indigo-50 hover:bg-indigo-500 px-4 py-2 rounded-xl text-sm font-semibold transition-colors duration-200 flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>

              </a>

          </div>
        </div>
      </div>
      <div class="hidden md:block">
        <div class="ml-4 flex items-center gap-4">
          <div class="text-indigo-100 px-3 text-sm flex items-center gap-3 bg-indigo-700/50 py-1.5 px-4 rounded-full border border-indigo-500/30" *ngIf="authService.currentUser() as user">
            <div class="w-6 h-6 rounded-full bg-indigo-400 flex items-center justify-center text-white font-bold text-xs uppercase shadow-sm">
              {{ user.username.charAt(0) }}
            </div>
            <span class="font-medium tracking-wide">{{ user.username }}</span>
          </div>
          <button (click)="logout()" *ngIf="authService.currentUser()" class="text-white hover:bg-red-500 bg-indigo-500/50 px-4 py-2 rounded-xl text-sm font-semibold transition-all shadow-sm hover:shadow-md">
            Logout
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>
