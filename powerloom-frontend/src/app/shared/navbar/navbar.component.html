<nav class="bg-indigo-600 shadow-xl relative z-50">
  <div class="max-w-full mx-auto px-4 sm:px-8 lg:px-12">
    <div class="flex items-center justify-between h-16">
      <!-- Left Section: Logo -->
      <div class="flex-shrink-0 flex items-center gap-3 cursor-pointer transition-transform hover:scale-105"
        [routerLink]="getDashboardUrl()">
        <div
          class="relative w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-lg overflow-hidden border border-white/20">
          <img src="images/texsync_logo.jpeg" alt="TexSync Logo" class="w-full h-full object-cover">
        </div>
        <div class="flex flex-col">
          <span class="text-white font-black text-2xl tracking-tighter leading-none">TexSync</span>
          <span class="text-indigo-200 text-[8px] font-bold uppercase tracking-[0.2em] leading-none mt-1 hidden xs:block">
            Power Loom App
          </span>
        </div>
      </div>

      <!-- Middle Section: Navigation Menus (Desktop) -->
      <div class="hidden md:flex flex-1 justify-center h-full" *ngIf="authService.currentUser() as user">
        <div class="flex items-stretch space-x-4 h-full">
          <!-- Owner Links -->
          <ng-container *ngIf="user.role === 'ADMIN'">
            <a routerLink="/owner/dashboard" routerLinkActive="!border-white !text-white" [routerLinkActiveOptions]="{exact: false}"
              class="inline-flex items-center h-full border-b-4 border-transparent px-4 text-sm font-bold text-indigo-100 hover:text-white transition-all">
              Dashboard
            </a>
            <a routerLink="/owner/approvals" routerLinkActive="!border-white !text-white" [routerLinkActiveOptions]="{exact: false}"
              class="inline-flex items-center h-full border-b-4 border-transparent px-4 text-sm font-bold text-indigo-100 hover:text-white transition-all">
              Approvals
            </a>
            <a routerLink="/owner/manage-jobers" routerLinkActive="!border-white !text-white" [routerLinkActiveOptions]="{exact: false}"
              class="inline-flex items-center h-full border-b-4 border-transparent px-4 text-sm font-bold text-indigo-100 hover:text-white transition-all">
              Manage Jobers
            </a>
            <a routerLink="/owner/manage-machines" routerLinkActive="!border-white !text-white" [routerLinkActiveOptions]="{exact: false}"
              class="inline-flex items-center h-full border-b-4 border-transparent px-4 text-sm font-bold text-indigo-100 hover:text-white transition-all">
              Machines
            </a>
          </ng-container>

          <!-- Jober Links -->
          <ng-container *ngIf="user.role === 'JOBER'">
            <a routerLink="/jober/dashboard" routerLinkActive="!border-white !text-white" [routerLinkActiveOptions]="{exact: false}"
              class="inline-flex items-center h-full border-b-4 border-transparent px-4 text-sm font-bold text-indigo-100 hover:text-white transition-all">
              Dashboard
            </a>
            <a routerLink="/jober/submit" routerLinkActive="!border-white !text-white" [routerLinkActiveOptions]="{exact: false}"
              class="inline-flex items-center h-full border-b-4 border-transparent px-4 text-sm font-bold text-indigo-100 hover:text-white transition-all">
              Production
            </a>
          </ng-container>
        </div>
      </div>

      <!-- Right Section: User Profile & Mobile Toggle -->
      <div class="flex items-center gap-4">
        <!-- Desktop User Menu -->
        <div class="hidden md:block" *ngIf="authService.currentUser() as user">
          <div class="relative user-menu">
            <button (click)="toggleDropdown()"
              class="flex items-center gap-2 p-1.5 rounded-2xl hover:bg-white/10 transition-all duration-200 focus:outline-none group">
              <div
                class="w-10 h-10 rounded-xl bg-white/20 backdrop-blur-md flex items-center justify-center text-white font-black text-lg border border-white/30 shadow-lg group-hover:scale-105 transition-transform group-hover:bg-white/30">
                {{ getInitials(user.username) }}
              </div>
              <svg class="w-4 h-4 text-indigo-100 transition-transform duration-200" [class.rotate-180]="showDropdown()"
                fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7" />
              </svg>
            </button>

            <!-- Dropdown Menu -->
            <div *ngIf="showDropdown()"
              class="absolute right-0 top-full mt-2 w-48 bg-white rounded-2xl shadow-2xl py-2 border border-gray-100 animate-scale-up origin-top-right z-[100]">
              <div class="px-4 py-2 border-b border-gray-50 mb-1">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Logged in as</p>
                <p class="text-sm font-black text-indigo-900 truncate">{{ user.username }}</p>
              </div>
              <a routerLink="/profile" (click)="showDropdown.set(false)"
                class="flex items-center gap-3 px-4 py-2.5 text-sm font-semibold text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 transition-colors">
                My Profile
              </a>
              <button (click)="logout()"
                class="w-full flex items-center gap-3 px-4 py-2.5 text-sm font-semibold text-red-600 hover:bg-red-50 transition-colors">
                Logout
              </button>
            </div>
          </div>
        </div>

        <!-- Mobile Menu Button -->
        <div class="flex md:hidden">
          <button (click)="toggleMobileMenu()"
            class="inline-flex items-center justify-center p-2 rounded-xl text-white hover:bg-white/10 focus:outline-none transition-all">
            <svg class="w-6 h-6" [class.hidden]="isMobileMenuOpen()" fill="none" stroke="currentColor"
              viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16m-7 6h7" />
            </svg>
            <svg class="w-6 h-6" [class.hidden]="!isMobileMenuOpen()" fill="none" stroke="currentColor"
              viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile Menu Content -->
  <div class="md:hidden animate-fade-in" *ngIf="isMobileMenuOpen() && authService.currentUser() as user">
    <div class="px-4 pt-2 pb-6 space-y-2 bg-indigo-700 shadow-2xl border-t border-indigo-500/30">

      <!-- User Info Header in Mobile -->
      <div class="flex items-center gap-3 px-3 py-4 mb-2 border-b border-indigo-500/20">
        <div class="w-10 h-10 rounded-xl bg-white/20 flex items-center justify-center text-white font-black">
          {{ getInitials(user.username) }}
        </div>
        <div>
          <p class="text-white font-bold leading-none">{{ user.username }}</p>
          <p class="text-indigo-200 text-[10px] font-black uppercase tracking-widest mt-1">{{ user.role }}</p>
        </div>
      </div>

      <!-- Links -->
      <ng-container *ngIf="user.role === 'ADMIN'">
        <a routerLink="/owner/dashboard" routerLinkActive="bg-indigo-500/50 border-l-4 border-white" (click)="isMobileMenuOpen.set(false)"
          class="block px-3 py-3 rounded-xl text-base font-bold text-white hover:bg-indigo-600 transition-all border-l-4 border-transparent">Dashboard</a>
        <a routerLink="/owner/approvals" routerLinkActive="bg-indigo-500/50 border-l-4 border-white" (click)="isMobileMenuOpen.set(false)"
          class="block px-3 py-3 rounded-xl text-base font-bold text-indigo-50 hover:bg-indigo-600 transition-all flex items-center justify-between border-l-4 border-transparent">
          Approvals
        </a>
        <a routerLink="/owner/manage-jobers" routerLinkActive="bg-indigo-500/50 border-l-4 border-white" (click)="isMobileMenuOpen.set(false)"
          class="block px-3 py-3 rounded-xl text-base font-bold text-indigo-50 hover:bg-indigo-600 transition-all border-l-4 border-transparent">Manage
          Jobers</a>
        <a routerLink="/owner/manage-machines" routerLinkActive="bg-indigo-500/50 border-l-4 border-white" (click)="isMobileMenuOpen.set(false)"
          class="block px-3 py-3 rounded-xl text-base font-bold text-indigo-50 hover:bg-indigo-600 transition-all border-l-4 border-transparent">Machines</a>
      </ng-container>

      <ng-container *ngIf="user.role === 'JOBER'">
        <a routerLink="/jober/dashboard" routerLinkActive="bg-indigo-500/50 border-l-4 border-white" (click)="isMobileMenuOpen.set(false)"
          class="block px-3 py-3 rounded-xl text-base font-bold text-white hover:bg-indigo-600 transition-all border-l-4 border-transparent">Dashboard</a>
        <a routerLink="/jober/submit" routerLinkActive="bg-indigo-500/50 border-l-4 border-white" (click)="isMobileMenuOpen.set(false)"
          class="block px-3 py-3 rounded-xl text-base font-bold text-indigo-50 hover:bg-indigo-600 transition-all border-l-4 border-transparent">Production</a>
      </ng-container>

      <div class="pt-4 mt-4 border-t border-indigo-500/20 grid grid-cols-2 gap-3">
        <a routerLink="/profile" (click)="isMobileMenuOpen.set(false)"
          class="flex items-center justify-center gap-2 px-4 py-3 bg-white/10 rounded-xl text-white font-bold text-sm">
          Profile
        </a>
        <button (click)="logout()"
          class="flex items-center justify-center gap-2 px-4 py-3 bg-red-500/20 rounded-xl text-red-100 font-bold text-sm">
          Logout
        </button>
      </div>
    </div>
  </div>
</nav>
